syntax = "proto3";
package licenses.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "licenses/v1/license.proto";
import "licenses/v1/license_type.proto";
import "licenses/v1/params.proto";

option go_package = "github.com/webstack-sdk/webstack/x/licenses/types";

// GenesisState defines the licenses module's genesis state.
message GenesisState {
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated LicenseType license_types = 2 [(gogoproto.nullable) = false];
  repeated License licenses = 3 [(gogoproto.nullable) = false];
  repeated AdminKey admin_keys = 4 [(gogoproto.nullable) = false];
}
