syntax = "proto3";
package license.v1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "license/v1/license.proto";
import "license/v1/license_type.proto";

option go_package = "github.com/webstack-sdk/webstack/x/license/types";

// Query defines the gRPC querier service. Permission grants are served by the
// x/permission module's queries, under the "license" namespace.
service Query {
  // LicenseType queries a license type by id.
  rpc LicenseType(QueryLicenseTypeRequest) returns (QueryLicenseTypeResponse) {
    option (google.api.http).get = "/webstack/license/license_type/{id}";
  }

  // LicenseTypes queries all license types.
  rpc LicenseTypes(QueryLicenseTypesRequest) returns (QueryLicenseTypesResponse) {
    option (google.api.http).get = "/webstack/license/license_types";
  }

  // License queries a license by type id and license id.
  rpc License(QueryLicenseRequest) returns (QueryLicenseResponse) {
    option (google.api.http).get = "/webstack/license/license/{type_id}/{id}";
  }

  // Licenses queries all licenses across all license types, active and revoked.
  rpc Licenses(QueryLicensesRequest) returns (QueryLicensesResponse) {
    option (google.api.http).get = "/webstack/license/licenses";
  }

  // LicensesByType queries all licenses for a given license type.
  rpc LicensesByType(QueryLicensesByTypeRequest) returns (QueryLicensesByTypeResponse) {
    option (google.api.http).get = "/webstack/license/licenses_by_type/{type_id}";
  }

  // LicensesByHolder queries the active licenses held by a given address.
  // Revoked licenses are not indexed by holder; use License or LicensesByType
  // to look them up.
  rpc LicensesByHolder(QueryLicensesByHolderRequest) returns (QueryLicensesByHolderResponse) {
    option (google.api.http).get = "/webstack/license/licenses_by_holder/{holder}";
  }

  // LicensesByHolderAndType queries the active licenses held by a given
  // address for a specific type. Revoked licenses are not indexed by holder;
  // use License or LicensesByType to look them up.
  rpc LicensesByHolderAndType(QueryLicensesByHolderAndTypeRequest) returns (QueryLicensesByHolderAndTypeResponse) {
    option (google.api.http).get = "/webstack/license/licenses_by_holder/{holder}/{type_id}";
  }
}

// QueryLicenseTypeRequest is the request type for the Query/LicenseType RPC method.
message QueryLicenseTypeRequest {
  string id = 1;
}

// QueryLicenseTypeResponse is the response type for the Query/LicenseType RPC method.
message QueryLicenseTypeResponse {
  LicenseType license_type = 1 [(gogoproto.nullable) = false];
}

// QueryLicenseTypesRequest is the request type for the Query/LicenseTypes RPC method.
message QueryLicenseTypesRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryLicenseTypesResponse is the response type for the Query/LicenseTypes RPC method.
message QueryLicenseTypesResponse {
  repeated LicenseType license_types = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicenseRequest is the request type for the Query/License RPC method.
message QueryLicenseRequest {
  string type_id = 1;
  uint64 id = 2;
}

// QueryLicenseResponse is the response type for the Query/License RPC method.
message QueryLicenseResponse {
  License license = 1 [(gogoproto.nullable) = false];
}

// QueryLicensesRequest is the request type for the Query/Licenses RPC method.
message QueryLicensesRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryLicensesResponse is the response type for the Query/Licenses RPC method.
message QueryLicensesResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicensesByTypeRequest is the request type for the Query/LicensesByType RPC method.
message QueryLicensesByTypeRequest {
  string type_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryLicensesByTypeResponse is the response type for the Query/LicensesByType RPC method.
message QueryLicensesByTypeResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicensesByHolderRequest is the request type for the Query/LicensesByHolder RPC method.
message QueryLicensesByHolderRequest {
  string holder = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryLicensesByHolderResponse is the response type for the Query/LicensesByHolder RPC method.
message QueryLicensesByHolderResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicensesByHolderAndTypeRequest is the request type for the Query/LicensesByHolderAndType RPC method.
message QueryLicensesByHolderAndTypeRequest {
  string holder = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string type_id = 2;
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

// QueryLicensesByHolderAndTypeResponse is the response type for the Query/LicensesByHolderAndType RPC method.
message QueryLicensesByHolderAndTypeResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
