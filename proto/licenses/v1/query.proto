syntax = "proto3";
package licenses.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "licenses/v1/license.proto";
import "licenses/v1/license_type.proto";
import "licenses/v1/params.proto";

option go_package = "github.com/webstack-sdk/webstack/x/licenses/types";

// Query defines the gRPC querier service.
service Query {
  // Params queries the module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/webstack/licenses/params";
  }

  // Permissions returns the list of valid admin key permissions.
  rpc Permissions(QueryPermissionsRequest) returns (QueryPermissionsResponse) {
    option (google.api.http).get = "/webstack/licenses/permissions";
  }

  // LicenseType queries a license type by id.
  rpc LicenseType(QueryLicenseTypeRequest) returns (QueryLicenseTypeResponse) {
    option (google.api.http).get = "/webstack/licenses/license_type/{id}";
  }

  // LicenseTypes queries all license types.
  rpc LicenseTypes(QueryLicenseTypesRequest) returns (QueryLicenseTypesResponse) {
    option (google.api.http).get = "/webstack/licenses/license_types";
  }

  // License queries a license by type id and license id.
  rpc License(QueryLicenseRequest) returns (QueryLicenseResponse) {
    option (google.api.http).get = "/webstack/licenses/license/{type_id}/{id}";
  }

  // LicensesByType queries all licenses for a given license type.
  rpc LicensesByType(QueryLicensesByTypeRequest) returns (QueryLicensesByTypeResponse) {
    option (google.api.http).get = "/webstack/licenses/licenses_by_type/{type_id}";
  }

  // LicensesByHolder queries all licenses held by a given address.
  rpc LicensesByHolder(QueryLicensesByHolderRequest) returns (QueryLicensesByHolderResponse) {
    option (google.api.http).get = "/webstack/licenses/licenses_by_holder/{holder}";
  }

  // LicensesByHolderAndType queries all licenses held by a given address for a specific type.
  rpc LicensesByHolderAndType(QueryLicensesByHolderAndTypeRequest) returns (QueryLicensesByHolderAndTypeResponse) {
    option (google.api.http).get = "/webstack/licenses/licenses_by_holder/{holder}/{type_id}";
  }

  // AdminKey queries the admin key grants for a given address.
  rpc AdminKey(QueryAdminKeyRequest) returns (QueryAdminKeyResponse) {
    option (google.api.http).get = "/webstack/licenses/admin_key/{address}";
  }

  // AdminKeys queries all admin keys.
  rpc AdminKeys(QueryAdminKeysRequest) returns (QueryAdminKeysResponse) {
    option (google.api.http).get = "/webstack/licenses/admin_keys";
  }

  // AdminKeysByLicenseType queries admin keys that have grants for a given license type.
  rpc AdminKeysByLicenseType(QueryAdminKeysByLicenseTypeRequest) returns (QueryAdminKeysByLicenseTypeResponse) {
    option (google.api.http).get = "/webstack/licenses/admin_keys_by_license_type/{license_type_id}";
  }
}

// QueryParamsRequest is the request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is the response type for the Query/Params RPC method.
message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// QueryPermissionsRequest is the request type for the Query/Permissions RPC method.
message QueryPermissionsRequest {}

// QueryPermissionsResponse is the response type for the Query/Permissions RPC method.
message QueryPermissionsResponse {
  repeated string permissions = 1;
}

// QueryLicenseTypeRequest is the request type for the Query/LicenseType RPC method.
message QueryLicenseTypeRequest {
  string id = 1;
}

// QueryLicenseTypeResponse is the response type for the Query/LicenseType RPC method.
message QueryLicenseTypeResponse {
  LicenseType license_type = 1 [(gogoproto.nullable) = false];
}

// QueryLicenseTypesRequest is the request type for the Query/LicenseTypes RPC method.
message QueryLicenseTypesRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryLicenseTypesResponse is the response type for the Query/LicenseTypes RPC method.
message QueryLicenseTypesResponse {
  repeated LicenseType license_types = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicenseRequest is the request type for the Query/License RPC method.
message QueryLicenseRequest {
  string type_id = 1;
  uint64 id = 2;
}

// QueryLicenseResponse is the response type for the Query/License RPC method.
message QueryLicenseResponse {
  License license = 1 [(gogoproto.nullable) = false];
}

// QueryLicensesByTypeRequest is the request type for the Query/LicensesByType RPC method.
message QueryLicensesByTypeRequest {
  string type_id = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryLicensesByTypeResponse is the response type for the Query/LicensesByType RPC method.
message QueryLicensesByTypeResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicensesByHolderRequest is the request type for the Query/LicensesByHolder RPC method.
message QueryLicensesByHolderRequest {
  string holder = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

// QueryLicensesByHolderResponse is the response type for the Query/LicensesByHolder RPC method.
message QueryLicensesByHolderResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryLicensesByHolderAndTypeRequest is the request type for the Query/LicensesByHolderAndType RPC method.
message QueryLicensesByHolderAndTypeRequest {
  string holder = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string type_id = 2;
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

// QueryLicensesByHolderAndTypeResponse is the response type for the Query/LicensesByHolderAndType RPC method.
message QueryLicensesByHolderAndTypeResponse {
  repeated License licenses = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryAdminKeyRequest is the request type for the Query/AdminKey RPC method.
message QueryAdminKeyRequest {
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// QueryAdminKeyResponse is the response type for the Query/AdminKey RPC method.
message QueryAdminKeyResponse {
  AdminKey admin_key = 1 [(gogoproto.nullable) = false];
}

// QueryAdminKeysRequest is the request type for the Query/AdminKeys RPC method.
message QueryAdminKeysRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

// QueryAdminKeysResponse is the response type for the Query/AdminKeys RPC method.
message QueryAdminKeysResponse {
  repeated AdminKey admin_keys = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

// QueryAdminKeysByLicenseTypeRequest is the request type for the Query/AdminKeysByLicenseType RPC method.
message QueryAdminKeysByLicenseTypeRequest {
  string license_type_id = 1;
  string permission = 2;
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}

// QueryAdminKeysByLicenseTypeResponse is the response type for the Query/AdminKeysByLicenseType RPC method.
message QueryAdminKeysByLicenseTypeResponse {
  repeated AdminKey admin_keys = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
