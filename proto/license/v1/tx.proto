syntax = "proto3";
package license.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "license/v1/params.proto";

option go_package = "github.com/webstack-sdk/webstack/x/license/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a governance operation for updating the module parameters.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/update_params"
      body: "*"
    };
  }

  // CreateLicenseType creates a new license type. Signer must be the module owner.
  rpc CreateLicenseType(MsgCreateLicenseType) returns (MsgCreateLicenseTypeResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/create_license_type"
      body: "*"
    };
  }

  // GrantPermissions merges permission grants for an address. Signer must be the module owner.
  // Existing grants for the address are preserved; new (permission, license type) pairs are unioned in.
  rpc GrantPermissions(MsgGrantPermissions) returns (MsgGrantPermissionsResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/grant_permissions"
      body: "*"
    };
  }

  // RevokePermissions removes the given (license type, permission) pairs from an address's
  // grants. Pairs that are not currently granted are silently ignored. Signer must be the
  // module owner.
  rpc RevokePermissions(MsgRevokePermissions) returns (MsgRevokePermissionsResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/revoke_permissions"
      body: "*"
    };
  }

  // IssueLicenses issues one or more licenses. Signer must have the "issue" grant for the license type.
  rpc IssueLicenses(MsgIssueLicenses) returns (MsgIssueLicensesResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/issue_licenses"
      body: "*"
    };
  }

  // RevokeLicenses revokes licenses for a holder, revoking the most recently issued first.
  // Signer must have the "revoke" grant for the license type.
  rpc RevokeLicenses(MsgRevokeLicenses) returns (MsgRevokeLicensesResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/revoke_licenses"
      body: "*"
    };
  }

  // TransferLicense transfers a license to a new holder. Signer must be the current holder and the type must be transferrable.
  rpc TransferLicense(MsgTransferLicense) returns (MsgTransferLicenseResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/transfer_license"
      body: "*"
    };
  }

  // UpdateLicenseType updates an existing license type. Signer must be the module owner.
  rpc UpdateLicenseType(MsgUpdateLicenseType) returns (MsgUpdateLicenseTypeResponse) {
    option (google.api.http) = {
      post: "/webstack/license/tx/update_license_type"
      body: "*"
    };
  }

}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "webstack/x/license/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse is the Msg/UpdateParams response type.
message MsgUpdateParamsResponse {}

// MsgCreateLicenseType is the Msg/CreateLicenseType request type.
message MsgCreateLicenseType {
  option (cosmos.msg.v1.signer) = "owner";
  option (amino.name) = "webstack/x/license/MsgCreateLicenseType";

  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
  bool transferrable = 3;
  string max_supply = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgCreateLicenseTypeResponse is the Msg/CreateLicenseType response type.
message MsgCreateLicenseTypeResponse {}

// MsgGrantPermissions is the Msg/GrantPermissions request type.
message MsgGrantPermissions {
  option (cosmos.msg.v1.signer) = "owner";
  option (amino.name) = "webstack/x/license/MsgGrantPermissions";

  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated PermissionGrant grants = 3 [(gogoproto.nullable) = false];
}

// MsgGrantPermissionsResponse is the Msg/GrantPermissions response type.
message MsgGrantPermissionsResponse {}

// PermissionPair identifies a single (license_type, permission) pair to revoke.
message PermissionPair {
  string license_type_id = 1;
  Permission permission = 2;
}

// MsgRevokePermissions is the Msg/RevokePermissions request type.
message MsgRevokePermissions {
  option (cosmos.msg.v1.signer) = "owner";
  option (amino.name) = "webstack/x/license/MsgRevokePermissions";

  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated PermissionPair permissions = 3 [(gogoproto.nullable) = false];
}

// MsgRevokePermissionsResponse is the Msg/RevokePermissions response type.
message MsgRevokePermissionsResponse {}

// IssueLicenseEntry defines a single issuance within a MsgIssueLicenses.
message IssueLicenseEntry {
  string license_type_id = 1;
  string holder = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string start_date = 3;
  string end_date = 4;
  uint64 count = 5;
}

// MsgIssueLicenses is the Msg/IssueLicenses request type.
message MsgIssueLicenses {
  option (cosmos.msg.v1.signer) = "issuer";
  option (amino.name) = "webstack/x/license/MsgIssueLicenses";

  string issuer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated IssueLicenseEntry entries = 2 [(gogoproto.nullable) = false];
}

// MsgIssueLicensesResponse is the Msg/IssueLicenses response type.
// Ids are the issued license ids, flattened in entry order.
message MsgIssueLicensesResponse {
  repeated uint64 ids = 1;
}

// MsgRevokeLicenses is the Msg/RevokeLicenses request type.
message MsgRevokeLicenses {
  option (cosmos.msg.v1.signer) = "revoker";
  option (amino.name) = "webstack/x/license/MsgRevokeLicenses";

  string revoker = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string license_type_id = 2;
  string holder = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 count = 4;
}

// MsgRevokeLicensesResponse is the Msg/RevokeLicenses response type.
message MsgRevokeLicensesResponse {
  repeated uint64 ids = 1;
}

// MsgTransferLicense is the Msg/TransferLicense request type.
message MsgTransferLicense {
  option (cosmos.msg.v1.signer) = "holder";
  option (amino.name) = "webstack/x/license/MsgTransferLicense";

  string holder = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string license_type_id = 2;
  uint64 id = 3;
  string recipient = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgTransferLicenseResponse is the Msg/TransferLicense response type.
message MsgTransferLicenseResponse {}

// MsgUpdateLicenseType is the Msg/UpdateLicenseType request type.
message MsgUpdateLicenseType {
  option (cosmos.msg.v1.signer) = "owner";
  option (amino.name) = "webstack/x/license/MsgUpdateLicenseType";

  string owner = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string id = 2;
  bool transferrable = 3;
  string max_supply = 4 [
    (cosmos_proto.scalar) = "cosmos.Int",
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateLicenseTypeResponse is the Msg/UpdateLicenseType response type.
message MsgUpdateLicenseTypeResponse {}
