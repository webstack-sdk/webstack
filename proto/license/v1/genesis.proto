syntax = "proto3";
package license.v1;

import "gogoproto/gogo.proto";
import "license/v1/license.proto";
import "license/v1/license_type.proto";

option go_package = "github.com/webstack-sdk/webstack/x/license/types";

// LicenseCount is the next-id sequence entry for one license type. It is
// exported explicitly rather than derived from LicenseType.issued_count so
// the id sequence and the stats counter remain independent concepts.
message LicenseCount {
  string license_type_id = 1;
  uint64 count = 2;
}

// GenesisState defines the licenses module's genesis state. Ownership and
// permission grants live in the x/permission module's genesis, under the
// "license" namespace.
message GenesisState {
  repeated LicenseType license_types = 1 [(gogoproto.nullable) = false];
  repeated License licenses = 2 [(gogoproto.nullable) = false];
  repeated LicenseCount license_counts = 3 [(gogoproto.nullable) = false];
}
